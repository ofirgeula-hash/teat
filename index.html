<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="קניות" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='42' fill='%231a1a2e'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='%236c63ff'%3E🛒%3C/text%3E%3C/svg%3E" />
  <title>רשימת קניות</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f14;
      --surface:   #1a1a2e;
      --surface2:  #22223b;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --danger:    #ef4444;
      --success:   #22c55e;
      --text:      #e2e8f0;
      --muted:     #8896a8;
      --border:    #2d2d4a;
      --radius:    14px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-top: max(var(--safe-top), 16px);
      padding-bottom: var(--safe-bot);
    }

    header {
      padding: 0 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon { font-size: 28px; line-height: 1; }

    .header-text { flex: 1; }

    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Sync status */
    .sync-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .sync-dot.synced  { background: var(--success); }
    .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
    .sync-dot.offline { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .sync-text {
      font-size: 11px;
      color: var(--muted);
    }

    /* Refresh button */
    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #refresh-btn:active { color: var(--accent2); border-color: var(--accent2); }
    #refresh-btn.spinning { animation: spin 0.6s linear; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .stats {
      margin: 0 20px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 16px;
      display: flex;
      gap: 20px;
      border: 1px solid var(--border);
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent2);
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    .input-area { padding: 0 20px 16px; }

    .input-row {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 12px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }

    #item-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      text-align: right;
      direction: rtl;
    }

    #item-input::placeholder { color: var(--muted); }

    #add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }

    #add-btn:active { background: var(--accent2); transform: scale(0.93); }

    .filters {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    #list-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 16px;
      -webkit-overflow-scrolling: touch;
    }

    #list-container::-webkit-scrollbar { display: none; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 56px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      animation: slideIn 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    li::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    li:has(.checkbox:checked)::before { background: var(--success); opacity: 1; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li.removing { animation: slideOut 0.2s ease forwards; }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(30px); max-height: 0; padding: 0; margin: 0; }
    }

    .checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }

    .checkbox:checked { background: var(--success); border-color: var(--success); }

    .checkbox:checked::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 13l4 4L19 7' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/14px no-repeat;
    }

    .item-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.4;
      word-break: break-word;
      transition: all 0.2s;
    }

    li.done .item-text { text-decoration: line-through; color: var(--muted); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:active { color: var(--danger); background: rgba(239, 68, 68, 0.12); }

    .actions-bar {
      padding: 0 20px 12px;
      display: flex;
      justify-content: center;
    }

    #clear-done {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }

    #clear-done.visible { display: block; }
    #clear-done:active { color: var(--danger); border-color: var(--danger); }

    #install-hint {
      margin: 0 20px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.5;
    }

    #install-hint .hint-icon { font-size: 18px; flex-shrink: 0; }
    #install-hint button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      margin-right: auto;
      padding: 0 4px;
    }
  </style>
</head>
<body>
<main id="app">

  <header>
    <div class="header-icon">🛒</div>
    <div class="header-text">
      <h1>רשימת קניות</h1>
      <div class="sync-row">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-text" id="sync-text">מתחבר…</span>
      </div>
    </div>
    <button id="refresh-btn" aria-label="רענן">↻</button>
  </header>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">סה״כ</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-remaining">0</span>
      <span class="stat-label">נותר</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-done">0</span>
      <span class="stat-label">הושלם</span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input id="item-input" type="text" placeholder="הוסף פריט לרשימה…" autocomplete="off" autocorrect="off" />
      <button id="add-btn" aria-label="הוסף">＋</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">הכל</button>
    <button class="filter-btn" data-filter="active">פעיל</button>
    <button class="filter-btn" data-filter="done">הושלם</button>
  </div>

  <div id="list-container">
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">🛍️</span>
      <p>הרשימה ריקה</p>
    </div>
    <ul id="list"></ul>
  </div>

  <div class="actions-bar">
    <button id="clear-done">מחק פריטים שהושלמו</button>
  </div>

  <div id="install-hint" role="complementary" style="display:none">
    <span class="hint-icon">📲</span>
    <span>להוספה למסך הבית: לחץ על <strong>שתף</strong> ← <strong>הוסף למסך הבית</strong></span>
    <button onclick="dismissHint()" aria-label="סגור">✕</button>
  </div>

</main>

<script>
  /* ── Firebase ───────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "AIzaSyB-sa9xR6DxdYv6DCAUn1Ze1Kzb6TMuxzA",
    authDomain:        "shopping-list-db6a8.firebaseapp.com",
    projectId:         "shopping-list-db6a8",
    storageBucket:     "shopping-list-db6a8.firebasestorage.app",
    messagingSenderId: "722011046106",
    appId:             "1:722011046106:web:0734fe777690e1270265e3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const col = db.collection('items');

  /* ── State ──────────────────────────────────────────────── */
  let items  = [];
  let filter = 'all';
  const CACHE_KEY = 'shopping-list-items';

  /* ── Sync status ────────────────────────────────────────── */
  const syncDot  = document.getElementById('sync-dot');
  const syncText = document.getElementById('sync-text');

  function setSyncStatus(state) {
    syncDot.className = 'sync-dot ' + state;
    syncText.textContent =
      state === 'synced'  ? 'מסונכרן ✓' :
      state === 'syncing' ? 'מסנכרן…'   :
                            'לא מחובר — גרסה שמורה';
  }

  /* ── DOM refs ───────────────────────────────────────────── */
  const listEl       = document.getElementById('list');
  const emptyEl      = document.getElementById('empty-state');
  const clearDoneBtn = document.getElementById('clear-done');
  const statTotal    = document.getElementById('stat-total');
  const statRemain   = document.getElementById('stat-remaining');
  const statDone     = document.getElementById('stat-done');

  /* ── Render ─────────────────────────────────────────────── */
  function getFiltered() {
    if (filter === 'active') return items.filter(i => !i.done);
    if (filter === 'done')   return items.filter(i => i.done);
    return items;
  }

  function render() {
    const filtered = getFiltered();
    const total    = items.length;
    const done     = items.filter(i => i.done).length;
    const remain   = total - done;

    statTotal.textContent  = total;
    statRemain.textContent = remain;
    statDone.textContent   = done;
    clearDoneBtn.classList.toggle('visible', done > 0);
    listEl.innerHTML = '';

    if (filtered.length === 0) {
      emptyEl.style.display = 'flex';
      listEl.style.display  = 'none';
      return;
    }

    emptyEl.style.display = 'none';
    listEl.style.display  = 'flex';

    filtered.forEach(item => {
      const li = document.createElement('li');
      if (item.done) li.classList.add('done');

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'checkbox'; cb.checked = item.done;
      cb.addEventListener('change', () => toggle(item.id));

      const span = document.createElement('span');
      span.className = 'item-text'; span.textContent = item.text;

      const del = document.createElement('button');
      del.className = 'delete-btn'; del.innerHTML = '🗑';
      del.setAttribute('aria-label', 'מחק');
      del.addEventListener('click', () => remove(item.id));

      li.append(cb, span, del);
      listEl.appendChild(li);
    });
  }

  function cacheLocally() {
    localStorage.setItem(CACHE_KEY, JSON.stringify(items));
  }

  /* ── Load from Firestore ────────────────────────────────── */
  async function loadFromFirestore() {
    setSyncStatus('syncing');
    try {
      const snap = await col.orderBy('order', 'desc').get();
      items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      cacheLocally();
      setSyncStatus('synced');
    } catch {
      try { items = JSON.parse(localStorage.getItem(CACHE_KEY)) || []; } catch { items = []; }
      setSyncStatus('offline');
    }
    render();
  }

  /* ── Actions ────────────────────────────────────────────── */
  async function addItem(text) {
    text = text.trim();
    if (!text) return;
    const order = Date.now();
    const tempId = 'tmp_' + order;
    items.unshift({ id: tempId, text, done: false, order });
    render();
    try {
      const ref = await col.add({ text, done: false, order });
      const idx = items.findIndex(i => i.id === tempId);
      if (idx !== -1) items[idx].id = ref.id;
      cacheLocally();
    } catch { /* stays in local state */ }
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.done = !item.done;
    render();
    try { await col.doc(id).update({ done: item.done }); cacheLocally(); } catch {}
  }

  function remove(id) {
    const filtered = getFiltered();
    const idx = filtered.findIndex(i => i.id === id);
    if (idx === -1) return;
    const li = listEl.querySelectorAll('li')[idx];
    const doRemove = () => {
      items = items.filter(i => i.id !== id);
      cacheLocally();
      render();
      if (!id.startsWith('tmp_')) col.doc(id).delete().catch(() => {});
    };
    if (li) {
      li.classList.add('removing');
      li.addEventListener('animationend', doRemove, { once: true });
    } else { doRemove(); }
  }

  async function clearDone() {
    const done = items.filter(i => i.done);
    items = items.filter(i => !i.done);
    cacheLocally();
    render();
    try {
      const batch = db.batch();
      done.filter(i => !i.id.startsWith('tmp_')).forEach(i => batch.delete(col.doc(i.id)));
      await batch.commit();
    } catch {}
  }

  /* ── Refresh button ─────────────────────────────────────── */
  const refreshBtn = document.getElementById('refresh-btn');
  refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('spinning');
    refreshBtn.addEventListener('animationend', () => refreshBtn.classList.remove('spinning'), { once: true });
    loadFromFirestore();
  });

  /* ── Input listeners ────────────────────────────────────── */
  document.getElementById('add-btn').addEventListener('click', () => {
    const inp = document.getElementById('item-input');
    addItem(inp.value); inp.value = ''; inp.focus();
  });

  document.getElementById('item-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { addItem(e.target.value); e.target.value = ''; }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); render();
    });
  });

  document.getElementById('clear-done').addEventListener('click', clearDone);

  /* ── iOS install hint ───────────────────────────────────── */
  function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
  function isStandalone() { return window.navigator.standalone === true; }
  function dismissHint() {
    document.getElementById('install-hint').style.display = 'none';
    localStorage.setItem('install-hint-dismissed', '1');
  }
  if (isIOS() && !isStandalone() && !localStorage.getItem('install-hint-dismissed')) {
    document.getElementById('install-hint').style.display = 'flex';
  }

  /* ── Service worker ─────────────────────────────────────── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }

  /* ── Init ───────────────────────────────────────────────── */
  loadFromFirestore();
</script>
</body>
</html>
