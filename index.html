<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7fa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="קניות ומשימות" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <title>קניות ומשימות</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #eef2f7;
      --surface:   #ffffff;
      --surface2:  #f0f5fa;
      --accent:    #4a7db8;
      --accent2:   #6b9fd4;
      --danger:    #d94f4f;
      --success:   #2e9e6a;
      --text:      #1c2b3a;
      --muted:     #6a8099;
      --border:    #cdd8e6;
      --radius:    14px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Top panel (add section) ── */
    .top-panel {
      background: var(--surface);
      border-radius: 0 0 28px 28px;
      box-shadow: 0 8px 24px rgba(74,125,184,.13);
      padding-top: max(var(--safe-top), 16px);
      padding-bottom: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      padding: 0 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon { font-size: 26px; line-height: 1; }
    .header-text { flex: 1; }

    .header-text h1 {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--accent);
    }

    .sync-row { display: flex; align-items: center; gap: 5px; margin-top: 2px; }

    .sync-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .sync-dot.synced  { background: var(--success); }
    .sync-dot.syncing { background: #e8a020; animation: pulse 1s infinite; }
    .sync-dot.offline { background: var(--danger); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .sync-text { font-size: 11px; color: var(--muted); }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 18px;
      width: 36px; height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    #refresh-btn:active { color: var(--accent); border-color: var(--accent); }
    #refresh-btn.spinning { animation: spin 0.6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Add store section ── */
    .add-store-section { padding: 0 20px 8px; }

    .add-store-trigger {
      display: inline-flex; align-items: center; gap: 5px;
      background: none;
      border: 1.5px dashed var(--border);
      color: var(--muted); font-family: inherit;
      font-size: 12px; padding: 4px 12px; border-radius: 20px;
      cursor: pointer; transition: all .15s;
    }
    .add-store-trigger:active { color: var(--accent); border-color: var(--accent); }

    .store-input-row {
      display: flex; gap: 8px; align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 8px 12px;
      box-shadow: 0 2px 10px rgba(74,125,184,.12);
    }
    #store-name-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 15px; color: var(--text); font-family: inherit;
      text-align: right; direction: rtl;
    }
    #store-name-input::placeholder { color: var(--muted); }
    #store-save-btn {
      background: var(--accent); color: #fff; border: none;
      font-family: inherit; font-size: 13px; font-weight: 600;
      padding: 5px 14px; border-radius: 8px; cursor: pointer;
    }
    #store-cancel-btn {
      background: none; border: none; color: var(--muted);
      font-family: inherit; font-size: 13px; cursor: pointer; padding: 5px 6px;
    }

    /* ── Add row (inline in list) ── */
    .add-row {
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; cursor: pointer;
      transition: border-color .15s;
      animation: none;
    }
    .add-row:active { border-color: var(--accent); }
    .add-row::before { display: none; }
    .add-row-icon { color: var(--accent); font-size: 20px; flex-shrink: 0; line-height: 1; }
    .add-row-placeholder { color: var(--muted); font-size: 16px; flex: 1; }
    .add-row-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 16px; color: var(--text); font-family: inherit;
      text-align: right; direction: rtl;
    }

    /* ── Store tabs ── */
    .store-tabs-wrap { padding: 20px 20px 10px; }

    .store-tabs {
      display: flex; gap: 6px;
      flex-wrap: wrap;
    }

    .store-tab {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px; font-family: inherit;
      cursor: pointer; white-space: nowrap;
      transition: all .15s;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .store-tab.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 600;
    }
    .store-tab-count {
      font-size: 11px; opacity: 0.75;
    }
    .store-tab-del {
      font-size: 9px; opacity: 0;
      transition: opacity .15s; margin-right: -1px;
    }
    .store-tab.active .store-tab-del { opacity: 0.65; }

    /* ── Filter tabs ── */
    .filters { padding: 0 20px 10px; display: flex; gap: 8px; }
    .filter-btn {
      flex: 1; padding: 7px 4px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-size: 12px; font-family: inherit;
      cursor: pointer; transition: all .15s; text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .filter-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 600;
    }

    /* ── List ── */
    #list-container {
      flex: 1; overflow-y: auto;
      padding: 0 20px 16px;
      -webkit-overflow-scrolling: touch;
    }
    #list-container::-webkit-scrollbar { display: none; }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 52px; opacity: .35; }
    .empty-state p { font-size: 15px; }

    ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    li {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 10px;
      padding: 12px 12px;
      animation: slideIn .22s ease;
      position: relative; overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,.04);
    }
    li::before {
      content: ''; position: absolute;
      inset: 0 auto 0 0; width: 3px;
      background: var(--accent); border-radius: 0 2px 2px 0;
      opacity: 0; transition: opacity .2s;
    }
    li:has(.checkbox:checked)::before { background: var(--success); opacity: 1; }

    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    li.removing { animation: slideOut .2s ease forwards; }
    @keyframes slideOut { to{opacity:0;transform:translateX(30px);max-height:0;padding:0;margin:0} }

    .checkbox {
      appearance: none; -webkit-appearance: none;
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      cursor: pointer; flex-shrink: 0; transition: all .2s; position: relative;
    }
    .checkbox:checked { background: var(--success); border-color: var(--success); }
    .checkbox:checked::after {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 13l4 4L19 7' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/14px no-repeat;
    }

    .item-text {
      flex: 1; font-size: 16px; line-height: 1.4;
      word-break: break-word; transition: all .2s;
      cursor: pointer; min-width: 0;
    }
    li.done .item-text { text-decoration: line-through; color: var(--muted); cursor: default; }

    .item-edit-input {
      flex: 1; background: none; border: none;
      border-bottom: 1.5px solid var(--accent);
      outline: none; font-size: 16px; color: var(--text);
      font-family: inherit; text-align: right; direction: rtl;
      padding-bottom: 2px; min-width: 0;
    }

    /* Store dropdown on each item */
    .item-store-select {
      appearance: none; -webkit-appearance: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px; font-family: inherit;
      padding: 3px 8px;
      border-radius: 10px;
      cursor: pointer; flex-shrink: 0;
      max-width: 82px;
      transition: border-color .15s;
    }
    .item-store-select:focus { border-color: var(--accent); outline: none; }

    .delete-btn {
      background: none; border: none; color: var(--muted);
      font-size: 17px; cursor: pointer;
      padding: 4px 5px; border-radius: 8px; flex-shrink: 0;
      transition: color .15s, background .15s; line-height: 1;
    }
    .delete-btn:active { color: var(--danger); background: rgba(217,79,79,.1); }

    /* ── Bottom ── */
    .actions-bar { padding: 0 20px 10px; display: flex; justify-content: center; }
    #clear-done {
      background: none; border: 1.5px solid var(--border);
      color: var(--muted); font-family: inherit; font-size: 13px;
      padding: 8px 20px; border-radius: 20px; cursor: pointer;
      transition: all .15s; display: none;
    }
    #clear-done.visible { display: block; }
    #clear-done:active { color: var(--danger); border-color: var(--danger); }

    /* ── Bottom nav (list switcher) ── */
    .bottom-nav {
      display: flex; gap: 6px;
      padding: 6px 16px calc(8px + var(--safe-bot));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-tab {
      flex: 1; padding: 9px 4px;
      border-radius: 10px; border: none;
      background: none; color: var(--muted);
      font-size: 13px; font-family: inherit; font-weight: 500;
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .nav-tab.active { background: var(--accent); color: #fff; font-weight: 700; }

    #install-hint {
      margin: 0 20px 10px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 8px; line-height: 1.5;
    }
    #install-hint .hint-icon { font-size: 18px; flex-shrink: 0; }
    #install-hint button {
      background: none; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; margin-right: auto; padding: 0 4px;
    }

    /* ── Undo toast ── */
    #undo-toast {
      position: fixed;
      left: 50%; bottom: calc(56px + var(--safe-bot) + 14px);
      transform: translateX(-50%) translateY(20px);
      background: #233140; color: #fff;
      padding: 12px 16px; border-radius: 12px;
      display: flex; align-items: center; gap: 14px;
      font-size: 14px; font-family: inherit;
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 50; max-width: calc(100% - 40px);
    }
    #undo-toast.visible {
      opacity: 1; transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    #undo-toast-msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #undo-toast-btn {
      background: none; border: none; color: #7fb3f0;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; flex-shrink: 0; padding: 0;
    }
  </style>
</head>
<body>
<main id="app">

  <!-- ═══ TOP PANEL: add section ═══ -->
  <div class="top-panel">

    <header>
      <div class="header-icon">🛒</div>
      <div class="header-text">
        <h1>רשימת קניות</h1>
        <div class="sync-row">
          <div class="sync-dot" id="sync-dot"></div>
          <span class="sync-text" id="sync-text">מתחבר…</span>
        </div>
      </div>
      <button id="refresh-btn" aria-label="רענן">↻</button>
    </header>

    <!-- Add store – above input -->
    <div class="add-store-section">
      <div id="add-store-collapsed">
        <button class="add-store-trigger" id="show-store-btn">＋ הוסף חנות</button>
      </div>
      <div id="add-store-expanded" style="display:none">
        <div class="store-input-row">
          <input id="store-name-input" type="text" placeholder="שם החנות (למשל: שופרסל)…" autocomplete="off" />
          <button id="store-save-btn">שמור</button>
          <button id="store-cancel-btn">ביטול</button>
        </div>
      </div>
    </div>

  </div><!-- /top-panel -->

  <!-- ═══ CONTENT: list section ═══ -->

  <!-- Store tabs (wrap to multiple rows) -->
  <div class="store-tabs-wrap">
    <div class="store-tabs" id="store-tabs"></div>
  </div>

  <!-- Status filter -->
  <div class="filters">
    <button class="filter-btn active" data-filter="active">פעיל</button>
    <button class="filter-btn" data-filter="done">הושלם</button>
  </div>

  <div id="list-container">
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">🛍️</span>
      <p>הרשימה ריקה</p>
    </div>
    <ul id="list"></ul>
  </div>

  <div class="actions-bar">
    <button id="clear-done">מחק פריטים שהושלמו</button>
  </div>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-tab active" data-tab="shopping">קניות</button>
    <button class="nav-tab" data-tab="yarin">ירין</button>
    <button class="nav-tab" data-tab="ofir">אופיר</button>
  </nav>

  <div id="install-hint" role="complementary" style="display:none">
    <span class="hint-icon">📲</span>
    <span>להוספה למסך הבית: לחץ על <strong>שתף</strong> ← <strong>הוסף למסך הבית</strong></span>
    <button onclick="dismissHint()" aria-label="סגור">✕</button>
  </div>

  <div id="undo-toast" role="status">
    <span id="undo-toast-msg"></span>
    <button id="undo-toast-btn">שחזר</button>
  </div>

</main>

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyB-sa9xR6DxdYv6DCAUn1Ze1Kzb6TMuxzA",
    authDomain:        "shopping-list-db6a8.firebaseapp.com",
    projectId:         "shopping-list-db6a8",
    storageBucket:     "shopping-list-db6a8.firebasestorage.app",
    messagingSenderId: "722011046106",
    appId:             "1:722011046106:web:0734fe777690e1270265e3"
  };
  firebase.initializeApp(firebaseConfig);
  const db        = firebase.firestore();
  const col       = db.collection('items');
  const storesCol = db.collection('stores');

  let items         = [];
  let stores        = [];
  let selectedStore = 'all';   // 'all' | store.id
  let filter        = 'active';

  const TABS = [
    { id: 'shopping', label: 'קניות', header: 'רשימת קניות'  },
    { id: 'yarin',    label: 'ירין',   header: 'משימות ירין'  },
    { id: 'ofir',     label: 'אופיר',  header: 'משימות אופיר' },
  ];
  const ACTIVE_TAB_KEY = 'shopping-list-active-tab';
  let activeTab = TABS.some(t => t.id === localStorage.getItem(ACTIVE_TAB_KEY))
    ? localStorage.getItem(ACTIVE_TAB_KEY)
    : 'shopping';

  const CACHE_KEY  = 'shopping-list-items';
  const STORES_KEY = 'shopping-list-stores';
  const GRACE_MS   = 5000; // how long a freshly-checked item stays visible in "active" before sliding to "הושלם"
  const UNDO_MS    = 5000; // how long an undo toast stays up before the deletion is committed

  const graceTimers = new Map(); // item id -> timeout id, for the GRACE_MS delay above
  const graceSet    = new Set(); // item ids currently within their grace window

  const listEl        = document.getElementById('list');
  const emptyEl       = document.getElementById('empty-state');
  const clearDoneBtn  = document.getElementById('clear-done');
  const syncDot       = document.getElementById('sync-dot');
  const syncText      = document.getElementById('sync-text');
  const storeTabsEl   = document.getElementById('store-tabs');
  const undoToastEl   = document.getElementById('undo-toast');
  const undoMsgEl     = document.getElementById('undo-toast-msg');
  const undoBtnEl     = document.getElementById('undo-toast-btn');

  /* ── Undo toast: optimistic local change now, real delete deferred until the
     window elapses (or committed early if another undo-able action starts) ── */
  let pendingUndo = null; // { timer, onUndo, onCommit }

  function hideToast() { undoToastEl.classList.remove('visible'); }

  function showUndoToast(message, { onUndo, onCommit, duration = UNDO_MS }) {
    if (pendingUndo) { clearTimeout(pendingUndo.timer); pendingUndo.onCommit(); }
    undoMsgEl.textContent = message;
    undoToastEl.classList.add('visible');
    const timer = setTimeout(() => {
      pendingUndo = null;
      hideToast();
      onCommit();
    }, duration);
    pendingUndo = { timer, onUndo, onCommit };
  }

  undoBtnEl.addEventListener('click', () => {
    if (!pendingUndo) return;
    clearTimeout(pendingUndo.timer);
    const { onUndo } = pendingUndo;
    pendingUndo = null;
    hideToast();
    onUndo();
  });

  /* ── Sync status ── */
  function setSyncStatus(state) {
    syncDot.className = 'sync-dot ' + state;
    syncText.textContent =
      state === 'synced'  ? 'מסונכרן ✓' :
      state === 'syncing' ? 'מסנכרן…'   : 'לא מחובר — גרסה שמורה';
  }

  function cacheLocally() {
    localStorage.setItem(CACHE_KEY,  JSON.stringify(items));
    localStorage.setItem(STORES_KEY, JSON.stringify(stores));
  }

  /* ── Init ── */
  async function init() {
    setSyncStatus('syncing');
    try {
      const [storesSnap, itemsSnap] = await Promise.all([
        storesCol.orderBy('order').get(),
        col.orderBy('order', 'desc').get()
      ]);
      stores = storesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      items  = itemsSnap.docs.map(d => ({ id: d.id, storeId: null, listType: 'shopping', ...d.data() }));
      cacheLocally();
      setSyncStatus('synced');
    } catch {
      try { items  = JSON.parse(localStorage.getItem(CACHE_KEY))  || []; } catch { items  = []; }
      try { stores = JSON.parse(localStorage.getItem(STORES_KEY)) || []; } catch { stores = []; }
      items.forEach(i => { if (!i.listType) i.listType = 'shopping'; });
      setSyncStatus('offline');
    }
    if (stores.length > 0 && selectedStore === 'all') selectedStore = stores[0].id;
    updateShoppingOnlyUI();
    updateHeader();
    renderStoreTabs();
    render();
  }

  /* ── Store tabs ── */
  function activeCount(storeId) {
    const shoppingItems = items.filter(i => (i.listType || 'shopping') === 'shopping');
    if (storeId === 'all') return shoppingItems.filter(i => !i.done).length;
    return shoppingItems.filter(i => i.storeId === storeId && !i.done).length;
  }

  function renderStoreTabs() {
    storeTabsEl.innerHTML = '';
    stores.forEach(s => storeTabsEl.appendChild(makeStoreTab(s.id, s.name, true)));
  }

  function makeStoreTab(id, name, canDelete) {
    const btn = document.createElement('button');
    btn.className = 'store-tab' + (selectedStore === id ? ' active' : '');

    const nameSpan = document.createElement('span');
    nameSpan.textContent = name;
    btn.appendChild(nameSpan);

    const countSpan = document.createElement('span');
    countSpan.className = 'store-tab-count';
    countSpan.textContent = '(' + activeCount(id) + ')';
    btn.appendChild(countSpan);

    if (canDelete) {
      const x = document.createElement('span');
      x.className = 'store-tab-del';
      x.textContent = '✕';
      x.setAttribute('role', 'button');
      x.setAttribute('aria-label', 'מחק חנות');
      x.addEventListener('click', e => {
        e.stopPropagation();
        requestDeleteStore(id, name);
      });
      btn.appendChild(x);
    }

    btn.addEventListener('click', () => {
      selectedStore = id;
      renderStoreTabs();
      render();
    });

    return btn;
  }

  /* ── Store CRUD ── */
  async function addStore(name) {
    name = name.trim();
    if (!name) return;
    const order  = Date.now();
    const tempId = 'tmp_' + order;
    stores.push({ id: tempId, name, order });
    renderStoreTabs();
    render();
    try {
      const ref = await storesCol.add({ name, order });
      const idx = stores.findIndex(s => s.id === tempId);
      if (idx !== -1) stores[idx].id = ref.id;
      cacheLocally();
      renderStoreTabs();
    } catch {}
  }

  function requestDeleteStore(id, name) {
    const store = stores.find(s => s.id === id);
    if (!store) return;
    const affected     = items.filter(i => i.storeId === id);
    const wasSelected  = selectedStore === id;

    stores = stores.filter(s => s.id !== id);
    affected.forEach(i => { i.storeId = null; });
    if (wasSelected) selectedStore = stores[0]?.id || 'all';
    cacheLocally();
    renderStoreTabs();
    render();

    showUndoToast('החנות "' + name + '" נמחקה', {
      onUndo: () => {
        stores.push(store);
        stores.sort((a, b) => a.order - b.order);
        affected.forEach(i => { i.storeId = id; });
        if (wasSelected) selectedStore = id;
        cacheLocally();
        renderStoreTabs();
        render();
      },
      onCommit: async () => {
        try {
          const batch = db.batch();
          batch.delete(storesCol.doc(id));
          affected.filter(i => !i.id.startsWith('tmp_'))
                  .forEach(i => batch.update(col.doc(i.id), { storeId: null }));
          await batch.commit();
        } catch {}
      }
    });
  }

  /* ── Add-store UI ── */
  function showStoreInput() {
    document.getElementById('add-store-collapsed').style.display = 'none';
    document.getElementById('add-store-expanded').style.display  = 'block';
    document.getElementById('store-name-input').focus();
  }
  function hideStoreInput() {
    document.getElementById('add-store-collapsed').style.display = '';
    document.getElementById('add-store-expanded').style.display  = 'none';
    document.getElementById('store-name-input').value = '';
  }

  document.getElementById('show-store-btn').addEventListener('click', showStoreInput);
  document.getElementById('store-save-btn').addEventListener('click', async () => {
    const inp = document.getElementById('store-name-input');
    if (inp.value.trim()) { await addStore(inp.value); hideStoreInput(); }
  });
  document.getElementById('store-cancel-btn').addEventListener('click', hideStoreInput);
  document.getElementById('store-name-input').addEventListener('keydown', async e => {
    if (e.key === 'Enter' && e.target.value.trim()) { await addStore(e.target.value); hideStoreInput(); }
    else if (e.key === 'Escape') hideStoreInput();
  });

  /* ── Change item store ── */
  async function changeItemStore(id, rawValue) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.storeId = rawValue === '' ? null : rawValue;
    cacheLocally();
    renderStoreTabs();
    render();
    if (!id.startsWith('tmp_')) {
      try { await col.doc(id).update({ storeId: item.storeId }); } catch {}
    }
  }

  /* ── Inline add row ── */
  function activateAddRow(li, ph) {
    if (li.querySelector('.add-row-input')) return; // already active
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'add-row-input';
    inp.placeholder = 'הוסף פריט…';
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const text = inp.value;
        if (text.trim()) {
          // clear the value BEFORE addItem()'s render() detaches this input: removing a
          // focused element fires blur synchronously (and isConnected is still true at
          // that instant), so the blur handler below would otherwise see the same
          // non-empty value and resubmit it as a duplicate item.
          inp.value = '';
          addItem(text);
          // re-activate new add-row so keyboard stays open
          const newPh = listEl.querySelector('.add-row-placeholder');
          if (newPh) activateAddRow(newPh.closest('li'), newPh);
        }
      } else if (e.key === 'Escape') {
        inp.replaceWith(ph);
      }
    });
    inp.addEventListener('blur', () => {
      if (inp.isConnected) { // still in the live document (render() detaches the whole <li>,
        // but inp.parentElement would still point at that detached <li>, so check isConnected)
        if (inp.value.trim()) addItem(inp.value);
        else inp.replaceWith(ph);
      }
    });
    ph.replaceWith(inp);
    inp.focus();
  }

  /* ── Inline item-text editing (tap to edit) ── */
  function startEdit(id, spanEl) {
    const item = items.find(i => i.id === id);
    if (!item || item.done) return;
    const inp = document.createElement('input');
    inp.type      = 'text';
    inp.className = 'item-edit-input';
    inp.value     = item.text;
    inp.addEventListener('blur',    () => finishEdit(id, inp, spanEl));
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { inp.blur(); }
      if (e.key === 'Escape') { inp.value = item.text; inp.blur(); }
    });
    spanEl.replaceWith(inp);
    inp.focus();
    inp.select();
  }

  async function finishEdit(id, inp, spanEl) {
    const newText = inp.value.trim();
    const item    = items.find(i => i.id === id);
    if (!item) { inp.replaceWith(spanEl); return; }
    if (newText && newText !== item.text) {
      item.text          = newText;
      spanEl.textContent = newText;
      cacheLocally();
      if (!id.startsWith('tmp_')) {
        try { await col.doc(id).update({ text: newText }); } catch {}
      }
    }
    inp.replaceWith(spanEl);
  }

  /* ── Tabs ── */
  function updateHeader() {
    document.querySelector('.header-text h1').textContent =
      (TABS.find(t => t.id === activeTab) || TABS[0]).header;
  }

  function updateShoppingOnlyUI() {
    const isShopping = activeTab === 'shopping';
    document.querySelector('.store-tabs-wrap').style.display    = isShopping ? '' : 'none';
    document.querySelector('.add-store-section').style.display  = isShopping ? '' : 'none';
  }

  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === activeTab);
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      localStorage.setItem(ACTIVE_TAB_KEY, activeTab);
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateShoppingOnlyUI();
      renderStoreTabs();
      render();
    });
  });

  /* ── Render ── */
  function getFiltered() {
    let result = items.filter(i => (i.listType || 'shopping') === activeTab);
    if (activeTab === 'shopping') {
      result = selectedStore === 'all' ? result : result.filter(i => i.storeId === selectedStore);
    }
    // items within their post-check grace window stay visible in "active" and
    // are held back from "הושלם" until the window elapses (see toggle()).
    if (filter === 'active') return result.filter(i => !i.done || graceSet.has(i.id));
    if (filter === 'done')   return result.filter(i =>  i.done && !graceSet.has(i.id));
    return result;
  }

  function render() {
    updateHeader();
    const filtered = getFiltered();
    clearDoneBtn.classList.toggle('visible', filtered.some(i => i.done));
    listEl.innerHTML = '';

    const showAddRow = filter === 'active';

    if (filtered.length === 0 && !showAddRow) {
      emptyEl.style.display = 'flex';
      listEl.style.display  = 'none';
      return;
    }
    emptyEl.style.display = 'none';
    listEl.style.display  = 'flex';

    if (showAddRow) {
      const addLi = document.createElement('li');
      addLi.className = 'add-row';
      const icon = document.createElement('span');
      icon.className = 'add-row-icon'; icon.textContent = '＋';
      const ph = document.createElement('span');
      ph.className = 'add-row-placeholder'; ph.textContent = 'הוסף פריט…';
      addLi.addEventListener('click', () => activateAddRow(addLi, ph));
      addLi.append(icon, ph);
      listEl.appendChild(addLi);
    }

    filtered.forEach(item => {
      const li = document.createElement('li');
      if (item.done) li.classList.add('done');

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'checkbox'; cb.checked = item.done;
      cb.addEventListener('change', () => toggle(item.id));

      const span = document.createElement('span');
      span.className   = 'item-text';
      span.textContent = item.text;
      if (!item.done) span.addEventListener('click', () => startEdit(item.id, span));

      li.append(cb, span);

      if (activeTab === 'shopping' && stores.length > 0) {
        const sel = document.createElement('select');
        sel.className = 'item-store-select';
        sel.setAttribute('aria-label', 'שייך לחנות');

        const noOpt = document.createElement('option');
        noOpt.value = ''; noOpt.textContent = 'ללא';
        if (!item.storeId) noOpt.selected = true;
        sel.appendChild(noOpt);

        stores.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id; opt.textContent = s.name;
          if (item.storeId === s.id) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', () => changeItemStore(item.id, sel.value));
        li.appendChild(sel);
      }

      const del = document.createElement('button');
      del.className = 'delete-btn'; del.innerHTML = '🗑';
      del.setAttribute('aria-label', item.done ? 'מחק לצמיתות' : 'סמן כהושלם');
      // In "active" this just marks the item done (same as the checkbox) so it
      // can still be undone from "הושלם". Only deleting from "הושלם" itself
      // is a real (undo-able) deletion.
      del.addEventListener('click', () => {
        if (item.done) requestDeleteItem(item.id);
        else toggle(item.id);
      });
      li.appendChild(del);

      listEl.appendChild(li);
    });
  }

  /* ── Item CRUD ── */
  async function addItem(text) {
    text = text.trim();
    if (!text) return;
    const storeId = (activeTab === 'shopping' && selectedStore !== 'all') ? selectedStore : null;
    const order   = Date.now();
    const tempId  = 'tmp_' + order;
    items.unshift({ id: tempId, text, done: false, storeId, listType: activeTab, order });
    renderStoreTabs();
    render();
    try {
      const ref = await col.add({ text, done: false, storeId, listType: activeTab, order });
      const idx = items.findIndex(i => i.id === tempId);
      if (idx !== -1) items[idx].id = ref.id;
      cacheLocally();
    } catch {}
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const turningDone = !item.done;
    item.done = turningDone;

    if (graceTimers.has(id)) {
      clearTimeout(graceTimers.get(id));
      graceTimers.delete(id);
      graceSet.delete(id);
    }
    if (turningDone && filter === 'active') {
      graceSet.add(id);
      graceTimers.set(id, setTimeout(() => {
        graceSet.delete(id);
        graceTimers.delete(id);
        render();
      }, GRACE_MS));
    }

    renderStoreTabs();
    render();
    try { await col.doc(id).update({ done: item.done }); cacheLocally(); } catch {}
  }

  function requestDeleteItem(id) {
    const idx = items.findIndex(i => i.id === id);
    if (idx === -1) return;
    const item = items[idx];

    items.splice(idx, 1);
    cacheLocally();
    renderStoreTabs();
    render();

    showUndoToast('הפריט "' + item.text + '" נמחק', {
      onUndo: () => {
        items.splice(idx, 0, item);
        cacheLocally();
        renderStoreTabs();
        render();
      },
      onCommit: async () => {
        if (!id.startsWith('tmp_')) {
          try { await col.doc(id).delete(); } catch {}
        }
      }
    });
  }

  function requestClearDone() {
    const done = getFiltered().filter(i => i.done);
    if (done.length === 0) return;
    const removedIds = new Set(done.map(i => i.id));
    items = items.filter(i => !removedIds.has(i.id));
    cacheLocally();
    renderStoreTabs();
    render();

    showUndoToast(
      done.length === 1 ? 'פריט אחד נמחק' : done.length + ' פריטים נמחקו',
      {
        onUndo: () => {
          items = items.concat(done).sort((a, b) => (b.order || 0) - (a.order || 0));
          cacheLocally();
          renderStoreTabs();
          render();
        },
        onCommit: async () => {
          try {
            const batch = db.batch();
            done.filter(i => !i.id.startsWith('tmp_')).forEach(i => batch.delete(col.doc(i.id)));
            await batch.commit();
          } catch {}
        }
      }
    );
  }

  /* ── Refresh ── */
  const refreshBtn = document.getElementById('refresh-btn');
  refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('spinning');
    refreshBtn.addEventListener('animationend', () => refreshBtn.classList.remove('spinning'), { once: true });
    init();
  });

  /* ── Filter events ── */
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('clear-done').addEventListener('click', requestClearDone);

  /* ── iOS install hint ── */
  function isIOS()        { return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
  function isStandalone() { return window.navigator.standalone === true; }
  function dismissHint()  {
    document.getElementById('install-hint').style.display = 'none';
    localStorage.setItem('install-hint-dismissed', '1');
  }
  if (isIOS() && !isStandalone() && !localStorage.getItem('install-hint-dismissed')) {
    document.getElementById('install-hint').style.display = 'flex';
  }

  /* ── Service Worker ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }

  init();
</script>
</body>
</html>
